name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run pytest

  wheel:
    name: the wheel stands alone
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build and import the wheel with no dev environment attached
        run: |
          # --isolated --no-project resolves the wheel and its declared
          # dependencies alone, with no access to this repo's dev environment,
          # which is what a user's machine looks like when uvx installs the
          # wheel the platform serves at /api/edge/dist/.
          uv build --wheel -o dist/
          uv run --isolated --no-project --with dist/nakagai_edge-*.whl \
            python -c "import nakagai_edge.edge.runtime; import nakagai_edge.cli; print('ok')"
